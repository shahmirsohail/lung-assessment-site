<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Assessment</title><style>html,body{height:100%;margin:0;font-family:Arial,sans-serif}header{padding:10px 14px;background:#f5f5f5;border-bottom:1px solid #ddd;display:flex;gap:10px;align-items:center;justify-content:space-between}iframe{width:100%;height:calc(100% - 58px);border:0}.left{display:flex;gap:10px;align-items:center}button{padding:8px 12px;font-size:14px;cursor:pointer}</style></head>
<body><header><div class="left"><strong>Lung Ultrasound Assessment</strong><span id="learner"></span></div><div><button id="completeBtn">Submit & send results</button> <button id="backBtn">Back</button></div></header><iframe id="assessmentFrame"></iframe>
<script>
const APP_VERSION='2026-04-06-course-hotfix-1';
const KEY='lungAssessmentLocalRecords'; const USER='lungAssessmentLocalUser'; const start=Date.now();
const SHARE_QUERY=window.location.search||'';
function withShare(url){
  if(!SHARE_QUERY) return url;
  const token=SHARE_QUERY.replace(/^\?/,'');
  const joiner=url.includes('?')?'&':'?';
  return `${url}${joiner}${token}`;
}
let quizVarNames=[];
let hasCompleted=false;
const captureDebug={
  player_found:false,
  quiz_var_count:0,
  interaction_count:0,
  last_error:'',
  last_capture_at:'',
  last_error_detail:''
};
const STABLE_RESPONSE_VAR='CapturedResponsesJson';
const OPTIONAL_STATUS_VARS=['LastAnsweredCaseId','LastAnsweredAt','LastAnsweredTimestamp','AssessmentScore','AssessmentCompletionStatus'];
function loadRecords(){return JSON.parse(localStorage.getItem(KEY)||'[]')} function saveRecords(r){localStorage.setItem(KEY, JSON.stringify(r))}
function loadUser(){return JSON.parse(localStorage.getItem(USER)||'{}')}
function upsertRecord(update){let records=loadRecords(); let i=records.findIndex(r=>r.attempt_id===update.attempt_id || (r.email===update.email && update.email)); if(i<0){records.push(update)} else {records[i]={...records[i],...update}} saveRecords(records)}
function setCaptureError(code, err){
  captureDebug.last_error=String(code||'capture_error');
  captureDebug.last_error_detail=err?String(err.message||err):'';
}
function clearCaptureError(){
  captureDebug.last_error='';
  captureDebug.last_error_detail='';
}
const user=loadUser(); document.getElementById('learner').textContent=user.email?`(${user.name||''} ${user.email})`:'';
document.getElementById('assessmentFrame').src=withShare('module/story.html');
document.getElementById('backBtn').onclick=()=>{location.href=withShare('index.html')};
async function loadAssessmentMetadata(){
  try{
    const res=await fetch('module/html5/data/js/data.js');
    const txt=await res.text();
    quizVarNames=[...new Set((txt.match(/CurrentQuiz_[A-Za-z0-9]+/g)||[]))];
    captureDebug.quiz_var_count=quizVarNames.length;
    if(!quizVarNames.length){setCaptureError('metadata_no_quiz_vars')} else if(captureDebug.last_error==='metadata_parse_failed'){clearCaptureError()}
  }catch(e){
    setCaptureError('metadata_parse_failed', e);
    quizVarNames=[];
    captureDebug.quiz_var_count=0;
  }
}
function safeParseJson(jsonText){
  if(typeof jsonText!=='string') return null;
  const trimmed=jsonText.trim();
  if(!trimmed) return null;
  try{
    return JSON.parse(trimmed);
  }catch(e){
    console.warn('CapturedResponsesJson is not valid JSON', e.message);
    return null;
  }
}
function getAssessmentResponses(){
  const responses={};
  captureDebug.quiz_var_count=quizVarNames.length;
  try{
    const frame=document.getElementById('assessmentFrame');
    const player=frame?.contentWindow?.GetPlayer?.();
    if(!player){
      captureDebug.player_found=false;
      captureDebug.interaction_count=0;
      return {};
    }
    captureDebug.player_found=true;

    const responses={};

    const stablePayload=player.GetVar(STABLE_RESPONSE_VAR);
    const parsedPayload=safeParseJson(stablePayload);
    if(parsedPayload && typeof parsedPayload==='object' && !Array.isArray(parsedPayload)){
      Object.assign(responses, parsedPayload);
    } else if(Array.isArray(parsedPayload)){
      responses.capturedResponses=parsedPayload;
    }

    for(const statusVarName of OPTIONAL_STATUS_VARS){
      const value=player.GetVar(statusVarName);
      if(value!=='' && value!==null && value!==undefined){
        responses[statusVarName]=value;
      }
    }

    // Best-effort fallback for legacy Storyline projects that have not yet
    // implemented CapturedResponsesJson writing triggers.
    if(quizVarNames.length){
      const fallbackResponses={};
      for(const name of quizVarNames){
        const value=player.GetVar(name);
        if(value!=='' && value!==null && value!==undefined){
          fallbackResponses[name]=value;
        }
      }
      for(const [name, value] of Object.entries(fallbackResponses)){
        if(!(name in responses)) responses[name]=value;
      }
    }

    captureDebug.interaction_count=Object.keys(responses).length;
    return responses;
  }catch(e){
    captureDebug.player_found=false;
    captureDebug.interaction_count=0;
    setCaptureError('capture_exception', e);
    return responses;
  }
}
async function postJson(url, body){
  const res=await fetch(withShare(url),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const data=await res.json().catch(()=>({ok:false,error:'Invalid server response'}));
  if(!res.ok || !data.ok){throw new Error(data.error||'Request failed')}
  return data;
}
function buildPayload(completed=false){
  const mins=Math.round((Date.now()-start)/60000);
  const nowIso=new Date().toISOString();
  if(!user.attempt_id){throw new Error('Missing attempt_id. Return to index and relaunch assessment.')}
  const responses=getAssessmentResponses();
  captureDebug.last_capture_at=nowIso;
  return {
    attempt_id:user.attempt_id,
    learner_id:user.learner_id||'',
    name:user.name||'',
    email:user.email||'',
    started:true,
    completed,
    last_opened_at:nowIso,
    minutes_spent:mins,
    responses,
    capture_debug:{...captureDebug},
  };
}
async function touch(completed=false){
  const payload=buildPayload(completed);
  upsertRecord(payload);
  try{
    await postJson(completed?'/api/attempt/complete':'/api/attempt/progress', payload);
  }catch(e){
    console.warn('Server sync failed', e.message);
    if(completed) throw e;
  }
}
loadAssessmentMetadata();
setInterval(()=>touch(false),30000); window.addEventListener('beforeunload',()=>{if(!hasCompleted) touch(false)});
document.getElementById('completeBtn').onclick=async ()=>{
  if(hasCompleted) return;
  try{
    hasCompleted=true;
    await touch(true);
    alert('Assessment submitted. Results were emailed to learner and internal recipient (if email setup is configured).');
    location.href=withShare('index.html');
  }catch(e){
    hasCompleted=false;
    alert(`Submission failed: ${e.message}`);
  }
};
</script></body></html>
