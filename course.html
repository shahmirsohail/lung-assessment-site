<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Assessment</title><style>html,body{height:100%;margin:0;font-family:Arial,sans-serif}header{padding:10px 14px;background:#f5f5f5;border-bottom:1px solid #ddd;display:flex;gap:10px;align-items:center;justify-content:space-between}iframe{width:100%;height:calc(100% - 58px);border:0}.left{display:flex;gap:10px;align-items:center}.right{display:flex;gap:10px;align-items:center}button{padding:8px 12px;font-size:14px;cursor:pointer}#syncStatus{font-size:13px;font-weight:600;padding:5px 8px;border-radius:999px;background:#e8f3ff;color:#0b4d8c}#syncStatus.pending{background:#fff3cd;color:#825200}#syncStatus.failed{background:#f8d7da;color:#842029}.blocking-error{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:center;justify-content:center;z-index:9999}.blocking-error.show{display:flex}.blocking-error .panel{max-width:520px;background:#fff;border-radius:8px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,.25)}.blocking-error h2{margin:0 0 12px;font-size:20px}.blocking-error p{margin:0 0 14px;line-height:1.4}.blocking-error .actions{display:flex;gap:10px;justify-content:flex-end}</style></head>
<body><header><div class="left"><strong>Lung Ultrasound Assessment</strong><span id="learner"></span></div><div class="right"><span id="syncStatus">Synced</span><button id="completeBtn">Submit & send results</button> <button onclick="location.href=withShare('index.html')">Back</button></div></header><iframe id="assessmentFrame" src="module/index_lms.html"></iframe>
<div id="blockingError" class="blocking-error" role="alertdialog" aria-modal="true" aria-labelledby="blockingErrorTitle"><div class="panel"><h2 id="blockingErrorTitle">Could not submit assessment</h2><p id="blockingErrorText">We could not sync your completion with the server. Please check your connection and retry. You will not be redirected until this succeeds.</p><div class="actions"><button id="blockingRetryBtn">Retry now</button></div></div></div>
<script>
const APP_VERSION='2026-04-14-lms-scorm';
const KEY='lungAssessmentLocalRecords'; const USER='lungAssessmentLocalUser'; const start=Date.now();
const RETRY_QUEUE_KEY='lungAssessmentRetryQueue';
const SHARE_QUERY=window.location.search||'';
function withShare(url){if(!SHARE_QUERY) return url; const token=SHARE_QUERY.replace(/^\?/,''); const joiner=url.includes('?')?'&':'?'; return `${url}${joiner}${token}`;}
let hasCompleted=false; let retryInFlight=false;
// SCORM 1.2 API stub — index_lms.html loads scormdriver.js which scans window.parent for window.API.
// All LMSSetValue calls (including cmi.interactions.N.student_response) are captured here.
const scormData={};
// Fallback quiz data received from the module iframe via postMessage (used when SCORM interactions aren't fired).
const quizVarData={};
window.addEventListener('message',function(e){
  if(e.data&&e.data.type==='sl_quiz_vars'&&e.data.data&&typeof e.data.data==='object'){
    Object.assign(quizVarData,e.data.data);
  }
});
window.API={
  LMSInitialize:()=>'true',
  LMSFinish:()=>'true',
  LMSCommit:()=>'true',
  LMSGetLastError:()=>'0',
  LMSGetErrorString:()=>'',
  LMSGetDiagnostic:()=>'',
  LMSGetValue:(el)=>scormData[el]||'',
  LMSSetValue:(el,val)=>{scormData[el]=val; if(el.includes('interactions')) console.log('[SCORM]',el,'=',val); return 'true';},
};
// Maps SCORM interaction IDs (as set by scormdriver.js) to human-readable case/question labels.
// Interaction IDs are the bare quiz-variable IDs Storyline uses internally.
const CASE_SLIDE_MAP={

  "65gar2uXnMJ":{c:"Case 1",q:"Secondary Pathology"},

  "5kpFVKROihy":{c:"Case 2",q:"Secondary Pathology"},
  "5oxZ0ZFyHt8":{c:"Case 3",q:"Primary Pathology"},
  "6EPyDpD5mOZ":{c:"Case 3",q:"Secondary Pathology"},
  "6ezkQYSpbNx":{c:"Case 3",q:"Confidence Level"},
  "6hweffvG2uw":{c:"Case 4",q:"Normal or Abnormal"},
  "5oGE3DEqRiT":{c:"Case 4",q:"Primary Pathology"},
  "6ghcilD1x5K":{c:"Case 4",q:"Secondary Pathology"},
  "6n7oNdyUl7w":{c:"Case 5",q:"Normal or Abnormal"},
  "5l12aCMhVVo":{c:"Case 5",q:"Primary Pathology"},
  "6OVGNwcEofI":{c:"Case 5",q:"Secondary Pathology"},
  "6NcI9JoE86e":{c:"Case 5",q:"Confidence Level"},
  "5cUveeY2AZX":{c:"Case 6",q:"Primary Pathology"},
  "6m3ARHw6WtV":{c:"Case 6",q:"Secondary Pathology"},
  "6ITaNbR8Q8S":{c:"Case 7",q:"Normal or Abnormal"},
  "5khAwQzVtQq":{c:"Case 7",q:"Primary Pathology"},
  "6mFyc4p3YCs":{c:"Case 7",q:"Secondary Pathology"},
  "5ubhpvHlHFI":{c:"Case 8",q:"Normal or Abnormal"},
  "6nS94DJ6CZC":{c:"Case 8",q:"Primary Pathology"},
  "6lo4G5D7ibC":{c:"Case 8",q:"Secondary Pathology"},
  "5kQEh3hweNd":{c:"Case 9",q:"Primary Pathology"},
  "6TqcnbGsBTw":{c:"Case 9",q:"Secondary Pathology"},
  "6Dqa9OU2g6X":{c:"Case 10",q:"Normal or Abnormal"},
  "5WsYCWPr2Da":{c:"Case 10",q:"Primary Pathology"},
  "6BEhuqTyUXA":{c:"Case 10",q:"Secondary Pathology"},
  "5x4OxX4Pa57":{c:"Case 10",q:"Confidence Level"},
  "6WKtFSF8KSC":{c:"Case 11",q:"Normal or Abnormal"},
  "5WWtcH0AG7U":{c:"Case 11",q:"Primary Pathology"},

  "5aUyEqImMJ1":{c:"Case 11",q:"Confidence Level"},
  "5yoCmTAHRxU":{c:"Case 12",q:"Primary Pathology"},
  "5s9nds7Vf6N":{c:"Case 12",q:"Secondary Pathology"},
  "652FLzQWU2K":{c:"Case 13",q:"Normal or Abnormal"},

  "62EbC5qy4XU":{c:"Case 16",q:"Secondary Pathology"},
  "63ill7FKLkC":{c:"Case 16",q:"Confidence Level"},
  // Previously unmapped — added to fix CSV missing columns
  "6MCBHcqGdug":{c:"Case 1",q:"Normal or Abnormal"},
  "68KaeOSsnS6":{c:"Case 1",q:"Confidence Level"},
  "5e9jomKlHfP":{c:"Case 2",q:"Normal or Abnormal"},
  "5ZhF3VzFmTy":{c:"Case 2",q:"Confidence Level"},
  "5yK3VMbcDoy":{c:"Case 3",q:"Normal or Abnormal"},
  "6IqoREZRvog":{c:"Case 4",q:"Confidence Level"},
  "5YbYFQbv0RC":{c:"Case 6",q:"Normal or Abnormal"},
  "69qco2hy745":{c:"Case 6",q:"Confidence Level"},
  "5ytielWvUeW":{c:"Case 7",q:"Confidence Level"},
  "6byTt3CHQ1q":{c:"Case 8",q:"Confidence Level"},
  "6dlML8DG70T":{c:"Case 9",q:"Normal or Abnormal"},
  "6ctKuAUWPDP":{c:"Case 9",q:"Confidence Level"},
  "5f08UagnTNW":{c:"Case 12",q:"Normal or Abnormal"},
  "6D6LXSB3Efo":{c:"Case 12",q:"Confidence Level"},
  "62h8oLr9tuL":{c:"Case 14",q:"Normal or Abnormal"},
};
function transformResponseKeys(raw){
  const out={};
  for(const [k,v] of Object.entries(raw)){
    // Match bare ID or CurrentQuiz_<ID> format (Storyline may use either in interaction IDs)
    const m=k.match(/^(?:CurrentQuiz_)?([A-Za-z0-9]+)$/);
    if(m){const map=CASE_SLIDE_MAP[m[1]]; if(map){out[`${map.c} - ${map.q}`]=v;}}
    // Unmapped keys are dropped — only CASE_SLIDE_MAP entries reach responses
  }
  return out;
}
const captureDebug={
  player_found:false,
  quiz_var_count:0,
  interaction_count:0,
  last_error:null,
  last_capture_at:null,
};
function setCaptureError(code, err){
  const errorState={code};
  if(err){
    errorState.message=err?.message?String(err.message):String(err);
    if(err?.name) errorState.name=String(err.name);
  }
  captureDebug.last_error=errorState;
}
function clearCaptureError(){
  captureDebug.last_error=null;
}
function loadRecords(){return JSON.parse(localStorage.getItem(KEY)||'[]')} function saveRecords(r){localStorage.setItem(KEY, JSON.stringify(r))}
function loadUser(){return JSON.parse(localStorage.getItem(USER)||'{}')}
function loadRetryQueue(){return JSON.parse(localStorage.getItem(RETRY_QUEUE_KEY)||'[]')}
function saveRetryQueue(queue){localStorage.setItem(RETRY_QUEUE_KEY, JSON.stringify(queue))}
function enqueueRetry(item){const queue=loadRetryQueue(); queue.push(item); saveRetryQueue(queue)}
function upsertRecord(update){let records=loadRecords(); let i=records.findIndex(r=>r.attempt_id===update.attempt_id || (r.email===update.email && update.email)); if(i<0){records.push(update)} else {records[i]={...records[i],...update}} saveRecords(records)}
const user=loadUser(); document.getElementById('learner').textContent=user.email?`(${user.name||''} ${user.email})`:'';
function setSyncStatus(state){
  const el=document.getElementById('syncStatus');
  if(!el) return;
  el.classList.remove('pending','failed');
  if(state==='pending'){el.textContent='Pending'; el.classList.add('pending'); return;}
  if(state==='failed'){el.textContent='Failed'; el.classList.add('failed'); return;}
  el.textContent='Synced';
}
function showBlockingError(message){
  document.getElementById('blockingErrorText').textContent=message||'We could not sync your completion with the server. Please check your connection and retry. You will not be redirected until this succeeds.';
  document.getElementById('blockingError').classList.add('show');
}
function hideBlockingError(){document.getElementById('blockingError').classList.remove('show')}
function getAssessmentResponses(){
  const responses={};
  try{
    // Primary source: SCORM 1.2 interactions captured via window.API above.
    // scormdriver.js sets cmi.interactions.N.id (question ID) and
    // cmi.interactions.N.student_response (the student's selected answer text).
    const count=parseInt(scormData['cmi.interactions._count']||'0',10);
    captureDebug.quiz_var_count=count;
    for(let i=0;i<count;i++){
      const id=scormData[`cmi.interactions.${i}.id`]||'';
      const resp=scormData[`cmi.interactions.${i}.student_response`];
      if(id && resp!==undefined && resp!==''){
        // id may arrive as "CurrentQuiz_6SU5leVeQsi" or just "6SU5leVeQsi"
        responses[id]=resp;
      }
    }
  }catch(e){
    setCaptureError('scorm_capture_exception',e);
  }
  try{
    const frame=document.getElementById('assessmentFrame');
    const player=frame?.contentWindow?.GetPlayer?.();
    captureDebug.player_found=Boolean(player);
    if(player && captureDebug.last_error?.code==='player_unavailable') clearCaptureError();
  }catch(e){setCaptureError('player_exception',e);}
  // Merge postMessage quiz var data as fallback (SCORM interactions take precedence if both present).
  const merged={...quizVarData,...responses};
  const transformed=transformResponseKeys(merged);
  captureDebug.interaction_count=Object.keys(transformed).length;
  captureDebug.quiz_var_polled=Object.keys(quizVarData).length;
  captureDebug.last_capture_at=new Date().toISOString();
  return transformed;
}
async function postJson(url, body){
  const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const data=await res.json().catch(()=>({ok:false,error:'Invalid server response'}));
  if(!res.ok || !data.ok){throw new Error(data.error||'Request failed')}
  return data;
}
function buildPayload(completed=false){
  const mins=Math.round((Date.now()-start)/60000);
  const nowIso=new Date().toISOString();
  if(!user.attempt_id){throw new Error('Missing attempt_id. Return to index and relaunch assessment.')}
  const responses=getAssessmentResponses();
  captureDebug.last_capture_at=nowIso;
  return {
    attempt_id:user.attempt_id,
    learner_id:user.learner_id||'',
    name:user.name||'',
    email:user.email||'',
    started:true,
    completed,
    last_opened_at:nowIso,
    minutes_spent:mins,
    responses,
    capture_debug:{
      ...captureDebug,
      scorm_interaction_count:scormData['cmi.interactions._count']||'0',
      scorm_keys_sample:Object.keys(scormData).filter(k=>k.includes('interactions')).slice(0,10),
    },
  };
}
async function touch(completed=false){
  const payload=buildPayload(completed);
  const url=completed?'/api/attempt/complete':'/api/attempt/progress';
  upsertRecord(payload);
  setSyncStatus('pending');
  try{
    const result=await postJson(url, payload);
    if(completed && result.attempt){
      upsertRecord({
        ...result.attempt,
        name:result.attempt.learner_name||user.name,
        email:result.attempt.learner_email||user.email,
      });
    }
    setSyncStatus('synced');
    return {ok:true};
  }catch(e){
    console.warn('Server sync failed', e.message);
    setSyncStatus('failed');
    enqueueRetry({url, payload, failed_at:new Date().toISOString()});
    return {ok:false, error:e.message||'Unknown error'};
  }
}
async function flushRetryQueue(){
  if(retryInFlight) return;
  const queue=loadRetryQueue();
  if(!queue.length) return;
  retryInFlight=true;
  setSyncStatus('pending');
  const remaining=[];
  for(const item of queue){
    try{
      await postJson(item.url, item.payload);
    }catch(e){
      remaining.push(item);
    }
  }
  saveRetryQueue(remaining);
  retryInFlight=false;
  setSyncStatus(remaining.length?'failed':'synced');
}
setInterval(()=>touch(false),30000); window.addEventListener('beforeunload',()=>{if(!hasCompleted) touch(false)});
setInterval(flushRetryQueue,45000);
window.addEventListener('focus', flushRetryQueue);
document.getElementById('completeBtn').onclick=async ()=>{
  if(hasCompleted) return;
  const completeBtn=document.getElementById('completeBtn');
  completeBtn.disabled=true;
  const result=await touch(true);
  if(!result.ok){
    hasCompleted=false;
    completeBtn.disabled=false;
    showBlockingError('Submission failed — server error: '+result.error);
    return;
  }
  hasCompleted=true;
  hideBlockingError();
  alert('Assessment submitted. Results were emailed to learner and internal recipient (if email setup is configured).');
  location.href=withShare('index.html');
};
document.getElementById('blockingRetryBtn').onclick=async ()=>{
  const btn=document.getElementById('blockingRetryBtn');
  btn.disabled=true;
  await flushRetryQueue();
  const result=await touch(true);
  btn.disabled=false;
  if(result.ok){
    hasCompleted=true;
    hideBlockingError();
    alert('Assessment submitted. Results were emailed to learner and internal recipient (if email setup is configured).');
    location.href=withShare('index.html');
  } else {
    showBlockingError('Submission failed — server error: '+result.error);
  }
};
</script></body></html>
