            if(!_secPathAcc[capturedQuizVar]) _secPathAcc[capturedQuizVar]={};
            var pathMap=_secPathAcc[capturedQuizVar];
            if(pathName){
              if(!pathMap[pathName]) pathMap[pathName]=[];
              var arr=pathMap[pathName];
              if(arr.length===0||arr[arr.length-1]!==txt) arr.push(txt);
            }
            var parts=[];
            for(var pi=0;pi<PATHOLOGY_ORDER.length;pi++){
              var pn=PATHOLOGY_ORDER[pi];
              if(pathMap[pn]&&pathMap[pn].length>0) parts.push(pn+': '+pathMap[pn].join(', '));
            }
            data['CurrentQuiz_'+capturedQuizVar]=parts.length?parts.join('; '):txt;
          }else{
            data['CurrentQuiz_'+capturedQuizVar]=txt;
          }
          try{window.parent.postMessage({type:'sl_quiz_vars',data:data},'*');}catch(ex){}
          console.log('[QuizCapture][pd]',capturedQuizVar,'=',data['CurrentQuiz_'+capturedQuizVar]);
        }
      },200);
    }catch(ex){}
  },true);

  console.log('[QuizCapture] diagnostic listener active, watching',Object.keys(SLIDE_MAP).length,'slides');
})();
</script>
