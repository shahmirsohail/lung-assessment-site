(function(){

  var lastQuizVar=null;
  var lastDiagKey='';

  function getSlideSignals(){
    var signals={gcSlide:null,lessonLoc:null,slideAttrs:{},slideText:'',hash:'',histState:null,dsKeys:[]};
    // Signal 1: GetPlayer() — methods already dumped once
    try{
      var player=typeof GetPlayer==='function'&&GetPlayer();
      if(player){
        if(!window._qcMethodsDumped){
          window._qcMethodsDumped=true;
          var methods=[];
          for(var k in player){try{if(typeof player[k]==='function')methods.push(k);}catch(e){}}
          console.log('[QuizCapture] GetPlayer() methods:',methods.join(', ')||'(none found)');
        }
        if(typeof player.GetCurrentSlide==='function') signals.gcSlide=player.GetCurrentSlide();
      }
    }catch(e){}
    // Signal 2: cmi.core.lesson_location from parent SCORM API
    try{
      var api=window.parent&&window.parent.API;
      if(api) signals.lessonLoc=api.LMSGetValue('cmi.core.lesson_location')||null;
    }catch(e){}
    // Signal 3: #slide element attributes and text
    try{
      var el=document.getElementById('slide');
      if(el){
        var attrs={};
        for(var i=0;i<el.attributes.length;i++) attrs[el.attributes[i].name]=el.attributes[i].value;
        signals.slideAttrs=attrs;
        signals.slideText=(el.textContent||'').replace(/\s+/g,' ').trim().substring(0,150);
      }
    }catch(e){}
    // Signal 4: URL hash — Storyline calls updateWindowHistory on slide change
    try{ signals.hash=window.location.hash||''; }catch(e){}
    // Signal 5: history.state — Storyline may pushState with slide metadata
    try{ signals.histState=window.history.state?JSON.stringify(window.history.state).substring(0,200):null; }catch(e){}
    // Signal 6: top-level keys of window.DS (Storyline data store, initialized to {})
    try{
      if(window.DS&&typeof window.DS==='object'){
        signals.dsKeys=Object.keys(window.DS).slice(0,20);
        // If DS looks interesting, log its full content once
        if(!window._qcDSDumped&&signals.dsKeys.length>0){
          window._qcDSDumped=true;
          console.log('[QuizCapture] window.DS:',JSON.stringify(window.DS).substring(0,500));
        }
      }
    }catch(e){}
    return signals;
  }

  function refreshCurrentSlide(){
    try{
      var s=getSlideSignals();
      var quizVar=s.gcSlide&&SLIDE_MAP[s.gcSlide]||null;
      var diagKey=JSON.stringify([s.gcSlide,s.lessonLoc,s.hash,s.histState]);
      if(diagKey!==lastDiagKey){
        lastDiagKey=diagKey;
        console.log('[QuizCapture] Slide signals'
          +' | GetCurrentSlide:',JSON.stringify(s.gcSlide)
          ,'| lesson_location:',JSON.stringify(s.lessonLoc)
          ,'| hash:',JSON.stringify(s.hash)
          ,'| history.state:',JSON.stringify(s.histState)
          ,'| DS keys:',JSON.stringify(s.dsKeys)
          ,'| #slide text:',JSON.stringify(s.slideText));
      }
      // Note: lastQuizVar is NOT set here — DS.pubSub listener owns it now.
    }catch(e){}
  }

  function getSelectedText(){
    var selected=document.querySelectorAll('[aria-checked="true"],[aria-pressed="true"],[aria-selected="true"]');
    var texts=[];
    selected.forEach(function(el){
      var t=(el.getAttribute('aria-label')||el.textContent||'').trim();
      if(t&&t.length<300) texts.push(t);
    });
    return texts.join('[,]');
  }

  // Primary: DS.pubSub event — fires whenever Storyline mounts/transitions a slide.
  // slideView.props.model.get('id') returns the slide ID that maps to SLIDE_MAP.
  // Confirmed pattern: frame.desktop.min.js uses u.on(d.slide.HAS_MOUNTED, n.onSlideChange).
  function onSlideMounted(slideView){
    try{
      var sid=slideView&&slideView.props&&slideView.props.model&&
              typeof slideView.props.model.get==='function'&&
              slideView.props.model.get('id');
      var qv=(sid&&SLIDE_MAP[sid])||null;
      lastQuizVar=qv;
      if(qv) console.log('[QuizCapture] Slide mounted → quiz var:',qv,'(slideId:',sid,')');
      else if(sid) console.log('[QuizCapture] Non-quiz slide mounted:',sid);
    }catch(e){}
  }

  function setupDSPubSub(){
    try{
      var pub=window.DS&&window.DS.pubSub;
      var evts=window.DS&&window.DS.events;
      if(!pub||!evts||!evts.slide||!evts.slide.HAS_MOUNTED) return false;
      pub.on(evts.slide.HAS_MOUNTED,onSlideMounted);
      if(evts.slide.HAS_CHANGED) pub.on(evts.slide.HAS_CHANGED,onSlideMounted);
      console.log('[QuizCapture] DS.pubSub listener registered');
      return true;
    }catch(e){ return false; }
  }

  // Retry until DS is initialised — bootstrapper loads scripts asynchronously after our IIFE runs.
  if(!setupDSPubSub()){
    var _dsRetry=0;
    var _dsTimer=setInterval(function(){
      if(setupDSPubSub()||++_dsRetry>=30) clearInterval(_dsTimer);
    },200);
  }

  // Secondary: intercept window.globalProvideData — called when each slide's JS file executes.
  // This catches lazy-loaded slides even if DS.pubSub fires before our listener registers.
  if(typeof window.globalProvideData==='function'){
    var _origGPD=window.globalProvideData;
    window.globalProvideData=function(key,data){
      try{
        if(SLIDE_MAP[key]){
          lastQuizVar=SLIDE_MAP[key];
          console.log('[QuizCapture] Slide JS loaded → quiz var:',lastQuizVar,'(key:',key,')');
        }else if(typeof key==='string'&&/^[A-Za-z0-9]{10,13}$/.test(key)){
          lastQuizVar=null; // Non-quiz slide JS executed
        }
      }catch(e){}
      return _origGPD.apply(this,arguments);
    };
  }

  // Diagnostic poll: logs slide signals only — does NOT update lastQuizVar.
  setInterval(refreshCurrentSlide,1000);

  document.addEventListener('click',function(e){
    try{
      var capturedQuizVar=lastQuizVar;
      var capturedTarget=e.target;
      if(!capturedQuizVar){
        var el=e.target,ids=[],n=0;
        while(el&&n++<15){if(el.id)ids.push(el.id);el=el.parentElement;}
        // Only log for clicks inside the slide area (not nav/outline)
        if(ids.indexOf('slide-window')>=0||ids.indexOf('slide')>=0){
          var s=getSlideSignals();
          console.log('[QuizCapture] Answer click — no quiz var'
            +' | Ancestor IDs:',ids.join(', ')
            ,'| hash:',JSON.stringify(s.hash)
            ,'| history.state:',JSON.stringify(s.histState));
        }
        return;
      }
      setTimeout(function(){
        var txt=getSelectedText();
        if(!txt) txt=(capturedTarget.getAttribute('aria-label')||capturedTarget.textContent||'').trim();

          data['CurrentQuiz_'+capturedQuizVar]=txt;
          try{window.parent.postMessage({type:'sl_quiz_vars',data:data},'*');}catch(ex){}
          console.log('[QuizCapture]',capturedQuizVar,'=',txt);
        }
      },150);
    }catch(ex){}
  },true);

  console.log('[QuizCapture] diagnostic listener active, watching',Object.keys(SLIDE_MAP).length,'slides');
})();
