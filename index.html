<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lung Ultrasound Assessment</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    margin: 0; background: #f4f6f9; color: #1a1a2e; line-height: 1.6;
  }
  header {
    background: #0b3d91; color: #fff; padding: 20px 32px;
  }
  header h1 { margin: 0; font-size: 22px; font-weight: 700; letter-spacing: 0.3px; }
  header p { margin: 4px 0 0; font-size: 14px; opacity: 0.8; }
  main { max-width: 860px; margin: 36px auto; padding: 0 20px 60px; }
  .card {
    background: #fff; border-radius: 10px; padding: 28px 32px;
    margin-bottom: 24px; box-shadow: 0 1px 4px rgba(0,0,0,.08);
  }
  .card h2 { margin: 0 0 18px; font-size: 17px; font-weight: 600; color: #0b3d91; }
  label { display: block; font-size: 14px; font-weight: 500; color: #444; margin-bottom: 4px; }
  .field { margin-bottom: 14px; }
  input[type=text], input[type=email] {
    width: 100%; max-width: 420px; padding: 10px 14px;
    border: 1px solid #cdd2db; border-radius: 6px; font-size: 15px;
    outline: none; transition: border-color .15s;
  }
  input[type=text]:focus, input[type=email]:focus { border-color: #0b3d91; }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-top: 8px; }
  button {
    padding: 10px 22px; font-size: 15px; font-weight: 600;
    border: none; border-radius: 6px; cursor: pointer; transition: background .15s, opacity .15s;
  }
  .btn-primary { background: #0b3d91; color: #fff; }
  .btn-primary:hover { background: #0931711; }
  .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }
  .btn-secondary { background: #e8ecf4; color: #0b3d91; }
  .btn-secondary:hover { background: #d6dcea; }
  .btn-outline { background: #fff; color: #0b3d91; border: 1.5px solid #0b3d91; }
  .btn-outline:hover { background: #f0f4ff; }
  .error { color: #c0392b; font-size: 14px; font-weight: 500; min-height: 1.3em; margin-top: 6px; }
  .save-feedback { font-size: 14px; color: #1a7a4a; font-weight: 500; display: none; }
  .save-feedback.show { display: inline; }
  /* Records table */
  .records-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
  .records-header h2 { margin: 0; }
  .empty-state { text-align: center; padding: 32px 0; color: #888; font-size: 15px; }
  .empty-state svg { display: block; margin: 0 auto 10px; opacity: .35; }
  .table-wrap { overflow-x: auto; }
  table { border-collapse: collapse; width: 100%; font-size: 14px; }
  th { background: #f0f4ff; color: #0b3d91; font-weight: 600; text-align: left; padding: 10px 12px; white-space: nowrap; }
  td { padding: 9px 12px; border-top: 1px solid #eef0f4; color: #2c2c3a; }
  tr:hover td { background: #fafbff; }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 12px; font-weight: 600;
  }
  .badge-green { background: #d4f5e2; color: #1a7a4a; }
  .badge-grey  { background: #eaeaea; color: #666; }
  /* Footer admin link */
  .footer-link { text-align: center; margin-top: 8px; }
  .footer-link a { font-size: 13px; color: #888; text-decoration: none; border-bottom: 1px dotted #bbb; }
  .footer-link a:hover { color: #0b3d91; border-color: #0b3d91; }
</style></head>
<body>
<header>
  <h1>Lung Ultrasound Assessment</h1>
</header>
<main>
  <div class="card">
    <h2>Start assessment</h2>
    <div class="field"><label for="name">Full name</label><input id="name" type="text" placeholder="Enter your full name" autocomplete="name"></div>
    <div class="field"><label for="email">Email address</label><input id="email" type="email" placeholder="Enter your email address" autocomplete="email"></div>
    <div class="btn-row">
      <button id="saveBtn" class="btn-secondary">Save details</button>
      <button id="launchBtn" class="btn-primary">Launch assessment</button>
      <span id="saveFeedback" class="save-feedback">Details saved.</span>
    </div>
    <p id="launchError" class="error" role="alert" aria-live="polite"></p>
  </div>

  <div class="card">
    <div class="records-header">
      <h2>Your assessment records</h2>
      <button id="exportBtn" class="btn-outline">&#8675; Download results</button>
    </div>
    <div id="records"></div>
  </div>
</main>
<div class="footer-link">
  <a id="adminLink" href="#">Admin dashboard</a>
</div>

<script>
const KEY='lungAssessmentLocalRecords';
const USER='lungAssessmentLocalUser';
const nameInput=document.getElementById('name');
const emailInput=document.getElementById('email');
const saveBtn=document.getElementById('saveBtn');
const launchBtn=document.getElementById('launchBtn');
const launchError=document.getElementById('launchError');
const exportBtn=document.getElementById('exportBtn');
const saveFeedback=document.getElementById('saveFeedback');
const SHARE_QUERY=window.location.search||'';
function withShare(url){
  if(!SHARE_QUERY) return url;
  const token=SHARE_QUERY.replace(/^\?/,'');
  const joiner=url.includes('?')?'&':'?';
  return `${url}${joiner}${token}`;
}
document.getElementById('adminLink').href=withShare('admin.html');
function loadRecords(){return JSON.parse(localStorage.getItem(KEY)||'[]')}
function saveRecords(r){localStorage.setItem(KEY, JSON.stringify(r))}
function loadUser(){return JSON.parse(localStorage.getItem(USER)||'{}')}
function saveUser(u){localStorage.setItem(USER, JSON.stringify(u))}
function generateLearnerId(){
  if(window.crypto?.randomUUID){return window.crypto.randomUUID();}
  return 'learner-'+Math.random().toString(36).slice(2)+Date.now().toString(36);
}
function ensureLearnerIdentity(){
  const existingUser=loadUser();
  if(existingUser.learner_id){return existingUser;}
  const learner_id=generateLearnerId();
  const updatedUser={...existingUser,learner_id};
  saveUser(updatedUser);
  const records=loadRecords();
  let changed=false;
  for(const record of records){
    if(!record.learner_id){record.learner_id=learner_id; changed=true;}
  }
  if(changed){saveRecords(records)}
  return updatedUser;
}
function upsertRecord(update){
  let records=loadRecords();
  let i=records.findIndex(r=>r.attempt_id===update.attempt_id || (r.learner_id===update.learner_id && update.learner_id));
  if(i<0){records.push(update)} else {records[i]={...records[i],...update}}
  saveRecords(records); render();
}
function formatDate(iso){
  if(!iso) return '—';
  try{return new Date(iso).toLocaleDateString(undefined,{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});}
  catch{return iso;}
}
function render(){
  const r=loadRecords();
  const container=document.getElementById('records');
  if(!r.length){
    container.innerHTML=`<div class="empty-state">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M8 12h8M8 8h5M8 16h4"/></svg>
      No assessment records yet. Launch the assessment to get started.
    </div>`;
    return;
  }
  let html='<div class="table-wrap"><table><thead><tr><th>Name</th><th>Email</th><th>Started</th><th>Status</th><th>Time spent</th></tr></thead><tbody>';
  for(const x of r){
    const statusBadge=x.completed
      ?'<span class="badge badge-green">Completed</span>'
      :'<span class="badge badge-grey">In progress</span>';
    const mins=x.minutes_spent||0;
    const timeStr=mins>0?`${mins} min`:'—';
    html+=`<tr><td>${x.name||'—'}</td><td>${x.email||'—'}</td><td>${formatDate(x.started_at)}</td><td>${statusBadge}</td><td>${timeStr}</td></tr>`;
  }
  html+='</tbody></table></div>';
  container.innerHTML=html;
}
function csvEscape(v){v=(v??'').toString(); return '"'+v.replaceAll('"','""')+'"'}
function exportCSV(){
  const rows=loadRecords(); if(!rows.length) return;
  const responseKeys=[...new Set(rows.flatMap(r=>Object.keys(r.responses||{})))].filter(k=>/^Case \d+ - /.test(k)).sort();
  const baseCols=['name','email','attempt_id','started','completed','started_at','last_opened_at','minutes_spent'];
  const allCols=[...baseCols,...responseKeys];
  const csv=[allCols.join(',')].concat(rows.map(r=>{
    const base=baseCols.map(c=>csvEscape(r[c]));
    const resp=responseKeys.map(k=>{const v=r.responses?.[k]??'';return csvEscape(typeof v==='object'?JSON.stringify(v):v);});
    return [...base,...resp].join(',');
  })).join('\n');
  const blob=new Blob([csv],{type:'text/csv'}); const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download='lung-assessment-results.csv'; a.click();
}
async function postJson(url, body){
  const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const data=await res.json().catch(()=>({ok:false,error:'Invalid server response'}));
  if(!res.ok || !data.ok){throw new Error(data.error||'Request failed')}
  return data;
}
const identityUser=ensureLearnerIdentity();
nameInput.value=identityUser.name||'';
emailInput.value=identityUser.email||'';
saveBtn.onclick=()=>{
  const currentUser=ensureLearnerIdentity();
  saveUser({name:nameInput.value.trim(),email:emailInput.value.trim(),attempt_id:currentUser.attempt_id||'',learner_id:currentUser.learner_id});
  saveFeedback.classList.add('show');
  setTimeout(()=>saveFeedback.classList.remove('show'),2500);
}
launchBtn.onclick=async ()=>{
  const now=new Date().toISOString();
  const currentUser=ensureLearnerIdentity();
  const baseUser={name:nameInput.value.trim(),email:emailInput.value.trim(),learner_id:currentUser.learner_id,attempt_id:currentUser.attempt_id||''};
  launchError.textContent='';
  if(!baseUser.name){
    launchError.textContent='Please enter your name before launching.';
    nameInput.focus(); return;
  }
  if(!baseUser.email){
    launchError.textContent='Please enter your email address before launching.';
    emailInput.focus(); return;
  }
  launchBtn.disabled=true;
  try{
    const startResult=await postJson('/api/attempt/start',{name:baseUser.name,email:baseUser.email,learner_id:baseUser.learner_id});
    const u={...baseUser,attempt_id:startResult.attempt_id};
    saveUser(u);
    upsertRecord({...u,started:true,started_at:now,last_opened_at:now,minutes_spent:0,completed:false});
    const assessmentWindow=window.open(withShare('course.html'),'_blank');
    if(!assessmentWindow){ location.href=withShare('course.html'); }
  }catch(err){
    launchError.textContent=err?.message||'Unable to start assessment. Please try again.';
  }finally{
    launchBtn.disabled=false;
  }
}
exportBtn.onclick=exportCSV;
window.addEventListener('focus',render);
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible') render()});
render();
</script>
</body></html>
