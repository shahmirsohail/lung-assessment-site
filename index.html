<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lung Ultrasound Assessment</title>
<style>
body{font-family:Arial,sans-serif;max-width:900px;margin:40px auto;padding:0 20px;line-height:1.5}
.card{border:1px solid #ddd;border-radius:10px;padding:20px;margin:20px 0}
input,button{padding:10px;font-size:16px;margin:6px 0;width:100%;max-width:420px}
button{cursor:pointer}
table{border-collapse:collapse;width:100%;margin-top:15px}td,th{border:1px solid #ddd;padding:8px;text-align:left}
.small{color:#555;font-size:14px}
.error{color:#b00020;font-weight:600;min-height:1.2em}
</style></head>
<body>
<h1>Lung Ultrasound Assessment</h1>
<div class="card">
  <h2>Learner details</h2>
  <input id="name" placeholder="Learner name">
  <input id="email" placeholder="Learner email">
  <button id="saveBtn">Save learner</button>
  <button id="launchBtn">Launch assessment</button>
  <p id="launchError" class="error" role="alert" aria-live="polite"></p>
  <p class="small">This version saves records to your internal database and sends completion emails when submitted.</p>
</div>
<div class="card">
  <h2>Local cache (backup only)</h2>
  <button id="exportBtn">Export CSV</button>
  <div id="records"></div>
</div>
<div class="card">
  <h2>Internal admin</h2>
  <p class="small">Use the internal dashboard to view all learner submissions.</p>
  <button id="adminBtn">Open admin dashboard</button>
</div>
<script>
const KEY='lungAssessmentLocalRecords';
const USER='lungAssessmentLocalUser';
const nameInput=document.getElementById('name');
const emailInput=document.getElementById('email');
const saveBtn=document.getElementById('saveBtn');
const launchBtn=document.getElementById('launchBtn');
const launchError=document.getElementById('launchError');
const exportBtn=document.getElementById('exportBtn');
const adminBtn=document.getElementById('adminBtn');
const SHARE_QUERY=window.location.search||'';
function withShare(url){
  if(!SHARE_QUERY) return url;
  const token=SHARE_QUERY.replace(/^\?/,'');
  const joiner=url.includes('?')?'&':'?';
  return `${url}${joiner}${token}`;
}
function loadRecords(){return JSON.parse(localStorage.getItem(KEY)||'[]')}
function saveRecords(r){localStorage.setItem(KEY, JSON.stringify(r))}
function loadUser(){return JSON.parse(localStorage.getItem(USER)||'{}')}
function saveUser(u){localStorage.setItem(USER, JSON.stringify(u))}
function generateLearnerId(){
  if(window.crypto?.randomUUID){return window.crypto.randomUUID();}
  return 'learner-'+Math.random().toString(36).slice(2)+Date.now().toString(36);
}
function ensureLearnerIdentity(){
  const existingUser=loadUser();
  if(existingUser.learner_id){return existingUser;}
  const learner_id=generateLearnerId();
  const updatedUser={...existingUser,learner_id};
  saveUser(updatedUser);
  const records=loadRecords();
  let changed=false;
  for(const record of records){
    if(!record.learner_id){
      record.learner_id=learner_id;
      changed=true;
    }
  }
  if(changed){saveRecords(records)}
  return updatedUser;
}
function upsertRecord(update){
  let records=loadRecords();
  let i=records.findIndex(r=>r.attempt_id===update.attempt_id || (r.learner_id===update.learner_id && update.learner_id));
  if(i<0){records.push(update)} else {records[i]={...records[i],...update}}
  saveRecords(records); render();
}
function formatCaptureDebug(debug){
  if(!debug) return 'Not captured';
  const parts=[];
  parts.push(debug.player_found?'Player ✓':'Player ✗');
  parts.push(`Vars: ${debug.quiz_var_count??0}`);
  parts.push(`Responses: ${debug.interaction_count??0}`);
  if(debug.last_error){parts.push(`Error: ${debug.last_error}`)}
  if(debug.last_capture_at){parts.push(`At: ${debug.last_capture_at}`)}
  return parts.join(' | ');
}
function render(){
  const r=loadRecords();
  if(!r.length){document.getElementById('records').innerHTML='<p>No local records yet.</p>'; return;}
  let html='<table><tr><th>Name</th><th>Email</th><th>Attempt ID</th><th>Started</th><th>Completed</th><th>Minutes</th><th>Responses captured</th><th>Capture debug</th></tr>';
  for(const x of r){
    const debugText=formatCaptureDebug(x.capture_debug);
    html+=`<tr><td>${x.name||''}</td><td>${x.email||''}</td><td>${x.attempt_id||''}</td><td>${x.started?'Yes':'No'}</td><td>${x.completed?'Yes':'No'}</td><td>${x.minutes_spent||0}</td><td>${Object.keys(x.responses||{}).length}</td><td title="${debugText.replaceAll('"','&quot;')}">${debugText}</td></tr>`
  }
  html+='</table>'; document.getElementById('records').innerHTML=html;
}
function csvEscape(v){v=(v??'').toString(); return '"'+v.replaceAll('"','""')+'"'}
function exportCSV(){
  const rows=loadRecords(); if(!rows.length) return;
  const cols=['name','email','attempt_id','started','completed','started_at','last_opened_at','minutes_spent','responses'];
  const csv=[cols.join(',')].concat(rows.map(r=>cols.map(c=>csvEscape(c==='responses'?JSON.stringify(r[c]||{}):r[c])).join(','))).join('\n');
  const blob=new Blob([csv],{type:'text/csv'}); const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download='lung-assessment-records.csv'; a.click();
}
async function postJson(url, body){
  const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const data=await res.json().catch(()=>({ok:false,error:'Invalid server response'}));
  if(!res.ok || !data.ok){throw new Error(data.error||'Request failed')}
  return data;
}
async function startAttempt(user){
  return postJson('/api/attempt/start',{
    learner_id:user.learner_id||'',
    name:user.name||'',
    email:user.email||'',
    started:true,
    completed:false,
  });
}
const identityUser=ensureLearnerIdentity();
nameInput.value=identityUser.name||'';
emailInput.value=identityUser.email||'';
saveBtn.onclick=()=>{
  const currentUser=ensureLearnerIdentity();
  saveUser({name:nameInput.value.trim(),email:emailInput.value.trim(),attempt_id:currentUser.attempt_id||'',learner_id:currentUser.learner_id});
  alert('Saved');
}
launchBtn.onclick=async ()=>{
  const now=new Date().toISOString();
  const currentUser=ensureLearnerIdentity();
  const baseUser={name:nameInput.value.trim(),email:emailInput.value.trim(),learner_id:currentUser.learner_id,attempt_id:currentUser.attempt_id||''};
  launchError.textContent='';
  if(!baseUser.name){
    launchError.textContent='Please enter learner name before launching.';
    nameInput.focus();
    return;
  }
  if(!baseUser.email){
    launchError.textContent='Please enter learner email before launching.';
    emailInput.focus();
    return;
  }
  launchBtn.disabled=true;
  try{
    const startResult=await postJson('/api/attempt/start',{name:baseUser.name,email:baseUser.email,learner_id:baseUser.learner_id});
    const u={...baseUser,attempt_id:startResult.attempt_id};
    saveUser(u);
    upsertRecord({...u,started:true,started_at:now,last_opened_at:now,minutes_spent:0,completed:false});
    const assessmentWindow=window.open(withShare('course.html'),'_blank');
    if(!assessmentWindow){ location.href=withShare('course.html'); }
  }catch(err){
    launchError.textContent=err?.message||'Unable to start assessment. Please try again.';
  }finally{
    launchBtn.disabled=false;
  }
}
exportBtn.onclick=exportCSV;
adminBtn.onclick=()=>{location.href=withShare('admin.html')};
window.addEventListener('focus',render);
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible') render()});
render();
</script>
</body></html>
