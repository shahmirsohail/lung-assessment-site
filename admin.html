<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Assessment Admin Dashboard</title>
<style>
body{font-family:Arial,sans-serif;max-width:1100px;margin:30px auto;padding:0 20px}
.card{border:1px solid #ddd;border-radius:10px;padding:16px;margin:14px 0}
input,button,select{padding:8px;font-size:14px;margin:4px}
button{cursor:pointer}
table{border-collapse:collapse;width:100%;margin-top:8px}th,td{border:1px solid #ddd;padding:8px;text-align:left;vertical-align:top}
pre{white-space:pre-wrap;word-wrap:break-word;max-height:180px;overflow:auto}
.small{font-size:13px;color:#666}
</style></head>
<body>
<h1>Internal Results Dashboard</h1>
<div class="card">
  <label>Admin token <input id="token" type="password" placeholder="Enter ADMIN_DASHBOARD_TOKEN"></label>
  <label>Filter by learner email <input id="emailFilter" placeholder="optional@domain.com"></label>
  <button id="loadBtn">Load attempts</button>
  <button onclick="location.href='index.html'">Back to learner page</button>
  <p class="small">Tip: token is never stored server-side; this page keeps it in browser memory only.</p>
</div>
<div class="card">
  <h2>Attempts</h2>
  <div id="status"></div>
  <div id="table"></div>
</div>
<script>
const tokenInput=document.getElementById('token');
const emailFilter=document.getElementById('emailFilter');
const statusEl=document.getElementById('status');
const tableEl=document.getElementById('table');

async function loadAttempts(){
  const token=tokenInput.value.trim();
  if(!token){alert('Admin token required');return;}
  const email=emailFilter.value.trim().toLowerCase();
  const q=email?`?email=${encodeURIComponent(email)}&limit=200`:'?limit=200';
  statusEl.textContent='Loading...';
  tableEl.innerHTML='';

  const res=await fetch(`/api/admin/attempts${q}`,{headers:{'x-admin-token':token}});
  const data=await res.json().catch(()=>({ok:false,error:'Invalid response'}));
  if(!res.ok || !data.ok){statusEl.textContent=`Error: ${data.error||'Request failed'}`; return;}

  const rows=data.rows||[];
  statusEl.textContent=`Loaded ${rows.length} attempt(s).`;
  if(!rows.length){tableEl.innerHTML='<p>No attempts found.</p>'; return;}

  let html='<table><tr><th>Attempt</th><th>Learner</th><th>Status</th><th>Timestamps</th><th>Responses</th><th>Actions</th></tr>';
  for(const row of rows){
    html+=`<tr>
      <td>${row.attempt_id||''}</td>
      <td>${row.learner_name||''}<br>${row.learner_email||''}</td>
      <td>Started: ${row.started?'Yes':'No'}<br>Completed: ${row.completed?'Yes':'No'}<br>Minutes: ${row.minutes_spent||0}</td>
      <td>Started: ${row.started_at||''}<br>Last opened: ${row.last_opened_at||''}<br>Completed: ${row.completed_at||''}</td>
      <td><pre>${JSON.stringify(row.responses||{},null,2)}</pre></td>
      <td>
        <button onclick="resend('${row.attempt_id}','learner')">Resend learner email</button>
        <button onclick="resend('${row.attempt_id}','admin')">Resend internal email</button>
      </td>
    </tr>`;
  }
  html+='</table>';
  tableEl.innerHTML=html;
}

async function resend(attemptId,target){
  const token=tokenInput.value.trim();
  if(!token){alert('Admin token required');return;}
  const res=await fetch('/api/admin/resend',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-admin-token':token},
    body:JSON.stringify({attempt_id:attemptId,target})
  });
  const data=await res.json().catch(()=>({ok:false,error:'Invalid response'}));
  if(!res.ok || !data.ok){alert(`Resend failed: ${data.error||'unknown error'}`);return;}
  alert('Resend triggered successfully.');
}

document.getElementById('loadBtn').onclick=loadAttempts;
</script>
</body></html>
