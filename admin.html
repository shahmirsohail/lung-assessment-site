<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Dashboard — Lung Ultrasound Assessment</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    margin: 0; background: #f4f6f9; color: #1a1a2e; line-height: 1.6;
  }
  header {
    background: #0b3d91; color: #fff; padding: 16px 32px;
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
  }
  .header-left h1 { margin: 0; font-size: 22px; font-weight: 700; letter-spacing: 0.3px; }
  .header-left p  { margin: 2px 0 0; font-size: 13px; opacity: 0.75; }
  .btn-ghost {
    padding: 8px 18px; font-size: 14px; font-weight: 600;
    background: transparent; color: rgba(255,255,255,0.9);
    border: 1.5px solid rgba(255,255,255,0.45); border-radius: 6px;
    cursor: pointer; transition: background .15s, color .15s;
    white-space: nowrap;
  }
  .btn-ghost:hover { background: rgba(255,255,255,0.12); color: #fff; }
  main { max-width: 1200px; margin: 36px auto; padding: 0 20px 60px; }
  .card {
    background: #fff; border-radius: 10px; padding: 28px 32px;
    margin-bottom: 24px; box-shadow: 0 1px 4px rgba(0,0,0,.08);
  }
  .card h2 { margin: 0 0 18px; font-size: 17px; font-weight: 600; color: #0b3d91; }
  label { display: block; font-size: 14px; font-weight: 500; color: #444; margin-bottom: 4px; }
  .field { margin-bottom: 16px; }
  .field-row { display: flex; gap: 16px; flex-wrap: wrap; }
  .field-row .field { flex: 1; min-width: 220px; }
  input[type=text], input[type=email], input[type=password] {
    width: 100%; padding: 10px 14px;
    border: 1px solid #cdd2db; border-radius: 6px; font-size: 15px;
    outline: none; transition: border-color .15s; background: #fff;
  }
  input[type=text]:focus, input[type=email]:focus, input[type=password]:focus { border-color: #0b3d91; }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-top: 4px; }
  button {
    padding: 10px 22px; font-size: 15px; font-weight: 600;
    border: none; border-radius: 6px; cursor: pointer; transition: background .15s, opacity .15s, border-color .15s;
  }
  .btn-primary { background: #0b3d91; color: #fff; }
  .btn-primary:hover { background: #093171; }
  .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }
  .btn-outline { background: #fff; color: #0b3d91; border: 1.5px solid #0b3d91; }
  .btn-outline:hover { background: #f0f4ff; }
  .hint { font-size: 13px; color: #888; margin-top: 10px; margin-bottom: 0; }
  /* Records header */
  .records-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px; flex-wrap: wrap; gap: 10px;
  }
  .records-header h2 { margin: 0; }
  /* Status message */
  .status-msg { font-size: 14px; color: #555; margin: 0 0 14px; min-height: 1.4em; }
  .status-msg.is-error { color: #c0392b; font-weight: 500; }
  /* Table */
  .table-wrap { overflow-x: auto; }
  table { border-collapse: collapse; width: 100%; font-size: 14px; }
  th {
    background: #f0f4ff; color: #0b3d91; font-weight: 600;
    text-align: left; padding: 10px 12px; white-space: nowrap;
  }
  td { padding: 10px 12px; border-top: 1px solid #eef0f4; color: #2c2c3a; vertical-align: top; }
  tr:hover td { background: #fafbff; }
  /* Badges */
  .badge {
    display: inline-block; padding: 2px 9px; border-radius: 999px;
    font-size: 12px; font-weight: 600; line-height: 1.6;
  }
  .badge-green { background: #d4f5e2; color: #1a7a4a; }
  .badge-grey  { background: #eaeaea; color: #666; }
  .badge-blue  { background: #dceeff; color: #0b3d91; }
  /* Learner cell */
  .learner-name { font-weight: 600; margin-bottom: 2px; }
  .learner-email { font-size: 13px; color: #555; }
  /* Attempt ID */
  .attempt-id { font-family: 'SFMono-Regular', Consolas, monospace; font-size: 12px; color: #666; word-break: break-all; max-width: 160px; }
  /* Status cell */
  .status-cell { display: flex; flex-direction: column; gap: 4px; }
  /* Timestamps */
  .ts-block { font-size: 12px; color: #666; }
  .ts-label { font-weight: 600; color: #444; }
  /* Responses */
  .responses-scroll { max-height: 200px; overflow-y: auto; min-width: 260px; }
  .responses-empty { font-size: 13px; color: #aaa; font-style: italic; }
  .resp-group { margin-bottom: 8px; }
  .resp-group-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #0b3d91; margin-bottom: 2px; }
  .resp-item { font-size: 13px; color: #333; padding: 1px 0; }
  .resp-question { color: #666; }
  .resp-answer { font-weight: 500; color: #1a1a2e; }
  /* Action buttons */
  .actions-cell { display: flex; flex-direction: column; gap: 6px; min-width: 160px; }
  .action-btn {
    padding: 6px 12px; font-size: 13px; font-weight: 600;
    border-radius: 5px; cursor: pointer; border: none; transition: background .15s;
    text-align: center;
  }
  .action-btn-primary { background: #e8ecf4; color: #0b3d91; }
  .action-btn-primary:hover { background: #d6dcea; }
  /* Empty state */
  .empty-state { text-align: center; padding: 40px 0; color: #888; font-size: 15px; }
  .empty-state svg { display: block; margin: 0 auto 12px; opacity: .3; }
  /* Loading spinner */
  .spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff;
    border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .btn-primary .spinner { border-color: rgba(255,255,255,0.35); border-top-color: #fff; }
</style></head>
<body>
<header>
  <div class="header-left">
    <h1>Admin Dashboard</h1>
    <p>Lung Ultrasound Assessment — Internal Results</p>
  </div>
  <button class="btn-ghost" id="backBtn">&#8592; Back to learner page</button>
</header>

<main>
  <div class="card">
    <h2>Authentication</h2>
    <div class="field">
      <label for="token">Password</label>
      <input id="token" type="password" placeholder="Enter password" autocomplete="current-password">
    </div>
    <div class="btn-row">
      <button id="loadBtn" class="btn-primary">Load attempts</button>
    </div>
  </div>

  <div class="card">
    <div class="records-header">
      <h2>Attempts</h2>
      <button id="exportBtn" class="btn-outline" style="display:none">&#8675; Export CSV</button>
    </div>
    <div id="filterWrap" style="display:none; margin-bottom:18px;">
      <div class="field" style="margin-bottom:0; max-width:360px;">
        <label for="emailFilter">Filter by learner email</label>
        <input id="emailFilter" type="email" placeholder="name@domain.com" autocomplete="off">
      </div>
    </div>
    <p id="statusMsg" class="status-msg"></p>
    <div id="tableWrap"></div>
  </div>
</main>

<script>
const tokenInput  = document.getElementById('token');
const emailFilter = document.getElementById('emailFilter');
const statusMsg   = document.getElementById('statusMsg');
const tableWrap   = document.getElementById('tableWrap');
const filterWrap  = document.getElementById('filterWrap');
const exportBtn   = document.getElementById('exportBtn');
const loadBtn     = document.getElementById('loadBtn');

const SHARE_QUERY = window.location.search || '';
function withShare(url) {
  if (!SHARE_QUERY) return url;
  const token = SHARE_QUERY.replace(/^\?/, '');
  const joiner = url.includes('?') ? '&' : '?';
  return `${url}${joiner}${token}`;
}

let _lastRows = [];

function formatDate(iso) {
  if (!iso) return '—';
  try {
    return new Date(iso).toLocaleDateString(undefined, {
      day: 'numeric', month: 'short', year: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
  } catch { return iso; }
}

function parseResponses(responses) {
  if (!responses || typeof responses !== 'object') return {};
  // Group by Case N
  const groups = {};
  for (const [key, val] of Object.entries(responses)) {
    const m = key.match(/^(Case \d+) - (.+)$/);
    if (!m) continue;
    const grp = m[1], question = m[2];
    if (!groups[grp]) groups[grp] = [];
    groups[grp].push({ question, answer: val });
  }
  return groups;
}

function renderResponses(responses) {
  const groups = parseResponses(responses);
  const keys = Object.keys(groups).sort((a, b) => {
    const na = parseInt(a.match(/\d+/)?.[0] || 0);
    const nb = parseInt(b.match(/\d+/)?.[0] || 0);
    return na - nb;
  });
  if (!keys.length) return '<span class="responses-empty">No responses recorded</span>';
  return '<div class="responses-scroll">' + keys.map(grp => {
    const items = groups[grp].map(({ question, answer }) =>
      `<div class="resp-item"><span class="resp-question">${esc(question)}: </span><span class="resp-answer">${esc(String(answer))}</span></div>`
    ).join('');
    return `<div class="resp-group"><div class="resp-group-title">${esc(grp)}</div>${items}</div>`;
  }).join('') + '</div>';
}

function esc(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function csvEscape(v) {
  v = (v ?? '').toString();
  return '"' + v.replaceAll('"', '""') + '"';
}

function exportCSV() {
  const rows = _lastRows;
  if (!rows.length) return;
  const responseKeys = [...new Set(rows.flatMap(r => Object.keys(r.responses || {})))]
    .filter(k => /^Case \d+ - /.test(k)).sort();
  const baseCols = ['attempt_id', 'learner_name', 'learner_email', 'started', 'completed',
                    'started_at', 'last_opened_at', 'completed_at', 'minutes_spent'];
  const allCols = [...baseCols, ...responseKeys];
  const csv = [allCols.join(',')].concat(rows.map(r => {
    const base = baseCols.map(c => csvEscape(r[c]));
    const resp = responseKeys.map(k => {
      const v = r.responses?.[k] ?? '';
      return csvEscape(typeof v === 'object' ? JSON.stringify(v) : v);
    });
    return [...base, ...resp].join(',');
  })).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'lung-assessment-admin-results.csv';
  a.click();
}

function renderTable(rows) {
  const filterVal = emailFilter.value.trim().toLowerCase();
  const filtered = filterVal
    ? rows.filter(r => (r.learner_email || '').toLowerCase().includes(filterVal))
    : rows;

  statusMsg.textContent = filtered.length === rows.length
    ? `Showing ${rows.length} attempt${rows.length !== 1 ? 's' : ''}.`
    : `Showing ${filtered.length} of ${rows.length} attempt${rows.length !== 1 ? 's' : ''} matching "${filterVal}".`;

  if (!filtered.length) {
    tableWrap.innerHTML = `<div class="empty-state">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="3"/>
        <path d="M8 12h8M8 8h5M8 16h4"/>
      </svg>
      ${filterVal ? `No attempts match "${esc(filterVal)}".` : 'No attempts found.'}
    </div>`;
    return;
  }

  let html = `<div class="table-wrap"><table>
    <thead><tr>
      <th>Attempt ID</th>
      <th>Learner</th>
      <th>Status</th>
      <th>Timestamps</th>
      <th>Responses</th>
      <th>Actions</th>
    </tr></thead><tbody>`;

  for (const row of filtered) {
    const completedBadge = row.completed
      ? '<span class="badge badge-green">Completed</span>'
      : '<span class="badge badge-grey">In progress</span>';
    const startedBadge = row.started
      ? '<span class="badge badge-blue">Started</span>'
      : '<span class="badge badge-grey">Not started</span>';
    const mins = row.minutes_spent || 0;

    html += `<tr>
      <td><div class="attempt-id">${esc(row.attempt_id || '—')}</div></td>
      <td>
        <div class="learner-name">${esc(row.learner_name || '—')}</div>
        <div class="learner-email">${esc(row.learner_email || '—')}</div>
      </td>
      <td>
        <div class="status-cell">
          ${startedBadge}
          ${completedBadge}
          <span style="font-size:12px;color:#666;margin-top:2px">${mins > 0 ? `${mins} min spent` : 'No time recorded'}</span>
        </div>
      </td>
      <td>
        <div class="ts-block">
          <div><span class="ts-label">Started:</span> ${formatDate(row.started_at)}</div>
          <div><span class="ts-label">Last opened:</span> ${formatDate(row.last_opened_at)}</div>
          <div><span class="ts-label">Completed:</span> ${formatDate(row.completed_at)}</div>
        </div>
      </td>
      <td>${renderResponses(row.responses)}</td>
      <td>
        <div class="actions-cell">
          <button class="action-btn action-btn-primary" onclick="resend('${esc(row.attempt_id)}','learner')">Resend learner email</button>
          <button class="action-btn action-btn-primary" onclick="resend('${esc(row.attempt_id)}','admin')">Resend internal email</button>
        </div>
      </td>
    </tr>`;
  }

  html += '</tbody></table></div>';
  tableWrap.innerHTML = html;
}

async function loadAttempts() {
  const token = tokenInput.value.trim();
  if (!token) {
    statusMsg.textContent = 'Please enter your password before loading.';
    statusMsg.className = 'status-msg is-error';
    tokenInput.focus();
    return;
  }

  loadBtn.disabled = true;
  loadBtn.innerHTML = '<span class="spinner"></span>Loading…';
  statusMsg.className = 'status-msg';
  statusMsg.textContent = '';
  tableWrap.innerHTML = '';
  filterWrap.style.display = 'none';
  exportBtn.style.display = 'none';
  emailFilter.value = '';

  try {
    const res = await fetch(withShare('/api/admin/attempts?limit=200'), {
      headers: { 'x-admin-token': token }
    });
    const data = await res.json().catch(() => ({ ok: false, error: 'Invalid response from server' }));
    if (!res.ok || !data.ok) {
      statusMsg.textContent = `Error: ${data.error || 'Request failed'}`;
      statusMsg.className = 'status-msg is-error';
      return;
    }

    const rows = data.rows || [];
    _lastRows = rows;

    if (!rows.length) {
      statusMsg.textContent = 'No attempts found.';
      tableWrap.innerHTML = `<div class="empty-state">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="3"/>
          <path d="M8 12h8M8 8h5M8 16h4"/>
        </svg>
        No attempts found.
      </div>`;
      return;
    }

    exportBtn.style.display = '';
    filterWrap.style.display = '';
    renderTable(rows);
  } catch (err) {
    statusMsg.textContent = `Unexpected error: ${err?.message || 'Unknown error'}`;
    statusMsg.className = 'status-msg is-error';
  } finally {
    loadBtn.disabled = false;
    loadBtn.textContent = 'Load attempts';
  }
}

async function resend(attemptId, target) {
  const token = tokenInput.value.trim();
  if (!token) { alert('Password required'); return; }
  try {
    const res = await fetch(withShare('/api/admin/resend'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-token': token },
      body: JSON.stringify({ attempt_id: attemptId, target })
    });
    const data = await res.json().catch(() => ({ ok: false, error: 'Invalid response' }));
    if (!res.ok || !data.ok) {
      alert(`Resend failed: ${data.error || 'Unknown error'}`);
      return;
    }
    alert('Email resent successfully.');
  } catch (err) {
    alert(`Resend error: ${err?.message || 'Unknown error'}`);
  }
}

loadBtn.onclick = loadAttempts;
exportBtn.onclick = exportCSV;
document.getElementById('backBtn').onclick = () => { location.href = withShare('index.html'); };

// Allow pressing Enter in the token field to load
tokenInput.addEventListener('keydown', e => { if (e.key === 'Enter') loadAttempts(); });

// Live client-side filter as user types
emailFilter.addEventListener('input', () => { if (_lastRows.length) renderTable(_lastRows); });
</script>
</body></html>
